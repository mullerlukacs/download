services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env.example
    depends_on:
      - postgres
      - redis
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mediasave
      POSTGRES_PASSWORD: mediasave
      POSTGRES_DB: mediasave
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
volumes:
  postgres-data:
